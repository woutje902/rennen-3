<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HardloopApp Pro</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    #status-bar { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 2px solid #2ecc71; width: 100%; max-width: 450px; text-align: center; margin-bottom: 10px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    #timer { font-size: 4rem; font-weight: bold; font-family: monospace; color: #2ecc71; margin: 5px 0; }
    #current-mode { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; color: #1DB954; }
    #player-ui { background: #282828; padding: 15px; border-radius: 15px; width: 100%; max-width: 420px; margin-bottom: 20px; border-bottom: 4px solid #1DB954; }
    #track-name { font-size: 0.85rem; color: #1DB954; font-weight: bold; text-align: center; margin-bottom: 10px; height: 1.2rem; overflow: hidden; }
    audio { width: 100%; height: 35px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
    
    .management-section { background: #1e1e1e; padding: 15px; border-radius: 15px; width: 100%; max-width: 420px; margin-bottom: 20px; border: 1px solid #333; }
    .upload-section { display: flex; gap: 10px; margin-bottom: 15px; }
    .upload-btn { flex: 1; background: #333; padding: 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; border: 1px dashed #555; text-align: center; font-weight: bold; }
    .upload-btn:hover { background: #444; }
    
    .track-list { max-height: 150px; overflow-y: auto; text-align: left; font-size: 0.8rem; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
    .track-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #222; }
    .delete-btn { background: #e74c3c; color: white; border: none; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
    .delete-btn:hover { background: #c0392b; }
    .toggle-list-btn { background: none; border: none; color: #888; font-size: 0.75rem; cursor: pointer; text-decoration: underline; margin-top: 5px; }

    .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; width: 100%; max-width: 600px; padding-bottom: 50px; }
    .lesson-card { background: #181818; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
    .start-btn { width: 100%; padding: 10px; background: #2ecc71; border: none; color: black; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    input[type="file"] { display: none; }
    #loader { font-size: 0.75rem; color: #888; }
</style>
</head>
<body>

<div id="status-bar">
    <div id="loader">Database opstarten...</div>
    <div id="current-mode">Kies een les</div>
    <div id="timer">00:00</div>
</div>

<div id="player-ui">
    <div id="track-name">Geen muziek</div>
    <audio id="mainPlayer" controls></audio>
</div>

<div class="management-section">
    <div class="upload-section">
        <label class="upload-btn">➕ Wandel MP3's<input type="file" id="upW" accept="audio/mp3" multiple onchange="addFilesToDB('W', this)"></label>
        <label class="upload-btn">➕ Hardloop MP3's<input type="file" id="upL" accept="audio/mp3" multiple onchange="addFilesToDB('L', this)"></label>
    </div>
    <center>
        <button class="toggle-list-btn" onclick="toggleTrackList()">Toon/Verberg opgeslagen nummers</button>
    </center>
    <div id="trackListWrapper" class="track-list">
        <strong>Wandelijst (W):</strong><div id="list-W"></div><br>
        <strong>Hardlooplijst (L):</strong><div id="list-L"></div>
    </div>
</div>

<div class="lesson-grid" id="lessonGrid"></div>

<script>
    const player = document.getElementById('mainPlayer');
    let db;
    let playlists = { w: [], l: [] };
    let timerInterval = null;

    // 1. Grid van de 30 lessen DIRECT opbouwen (Zodat dit ALTIJD zichtbaar is, ongeacht de database)
    function bouwLessenGrid() {
        const grid = document.getElementById('lessonGrid');
        grid.innerHTML = ""; // Maak leeg voor de zekerheid
        for (let i = 1; i <= 30; i++) {
            const card = document.createElement('div');
            card.className = 'lesson-card';
            card.innerHTML = `<strong>Les ${i}</strong><button class="start-btn" onclick="runLes(${i})">START</button>`;
            grid.appendChild(card);
        }
    }

    // 2. Database initialisatie (IndexedDB)
    function initDB() {
        const request = indexedDB.open("HardloopAppDB", 1);
        
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("playlistW")) db.createObjectStore("playlistW", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("playlistL")) db.createObjectStore("playlistL", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadMusicFromDB();
        };

        request.onerror = function() {
            document.getElementById('loader').innerText = "Database fout ❌";
        };
    }

    // 3. Muziek inladen uit de lokale database
    function loadMusicFromDB() {
        if (!db) return;
        
        let txW = db.transaction("playlistW", "readonly");
        txW.objectStore("playlistW").getAll().onsuccess = function(e1) {
            playlists.w = e1.target.result;
            
            let txL = db.transaction("playlistL", "readonly");
            txL.objectStore("playlistL").getAll().onsuccess = function(e2) {
                playlists.l = e2.target.result;
                
                document.getElementById('loader').innerText = `W: ${playlists.w.length} | L: ${playlists.l.length} nummers opgeslagen`;
                renderTrackManagementLists();
            };
        };
    }

    // 4. Bestanden toevoegen (Uploaden naar browser)
    function addFilesToDB(type, inputElement) {
        const files = inputElement.files;
        if (files.length === 0) return;

        document.getElementById('loader').innerText = "Bezig met verwerken... ⏳";
        const tx = db.transaction("playlist" + type, "readwrite");
        const store = tx.objectStore("playlist" + type);

        let count = 0;
        Array.from(files).forEach(file => {
            const trackData = { name: file.name.replace(/\.[^/.]+$/, ""), fileBlob: file };
            const request = store.add(trackData);
            
            request.onsuccess = function() {
                count++;
                if (count === files.length) {
                    loadMusicFromDB();
                    inputElement.value = ""; 
                }
            };
        });
    }

    // 5. Bestanden verwijderen
    function deleteTrack(type, id) {
        const tx = db.transaction("playlist" + type, "readwrite");
        const store = tx.objectStore("playlist" + type);
        store.delete(id).onsuccess = function() {
            loadMusicFromDB();
        };
    }

    // 6. Beheerscherm updaten
    function renderTrackManagementLists() {
        ['W', 'L'].forEach(type => {
            const container = document.getElementById('list-' + type);
            container.innerHTML = "";
            const currentList = playlists[type.toLowerCase()];
            
            if (!currentList || currentList.length === 0) {
                container.innerHTML = "<span style='color:#555;'>Geen nummers</span>";
                return;
            }

            currentList.forEach(track => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.innerHTML = `<span>🎵 ${track.name}</span> <button class="delete-btn" onclick="deleteTrack('${type}', ${track.id})">wissen</button>`;
                container.appendChild(div);
            });
        });
    }

    function toggleTrackList() {
        const el = document.getElementById('trackListWrapper');
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    // 7. Muziek afspelen
    function speelMuziek(type) {
        const cat = type.toLowerCase();
        const lijst = playlists[cat];
        if (lijst && lijst.length > 0) {
            const track = lijst[Math.floor(Math.random() * lijst.length)];
            document.getElementById('track-name').innerText = "🎵 " + track.name;
            
            player.src = URL.createObjectURL(track.fileBlob);
            player.load();
            player.play().catch(() => {
                document.getElementById('track-name').innerText = "⚠️ Klik play om te starten";
            });

            player.onended = () => speelMuziek(type);
        } else {
            document.getElementById('track-name').innerText = `Geen muziek in lijst ${type.toUpperCase()}`;
        }
    }

    // 8. Trainingsschema en timer-loop
    async function runLes(lesNr) {
        if (timerInterval) clearInterval(timerInterval);
        
        const wandelTijd = lesNr <= 5 ? 1 : 2; 
        const loopTijd = lesNr; 
        const schema = `${wandelTijd}w-${loopTijd}l-${wandelTijd}w`; 
        
        const segs = schema.match(/(\d+[wl])/g);
        spreekUit(`Les ${lesNr} gestart.`);

        for (let s of segs) {
            let tijd = parseInt(s) * 60;
            let type = s.slice(-1);
            document.getElementById('current-mode').innerText = type === 'w' ? "Wandelen" : "Hardlopen";
            
            speelMuziek(type);
            spreekUit(`Nu ${parseInt(s)} ${parseInt(s) === 1 ? 'minuut' : 'minuten'} ${type === 'w' ? 'wandelen' : 'hardlopen'}`);
            
            await new Promise(resolve => {                timerInterval = setInterval(() => {
                    let m = Math.floor(tijd/60), sec = tijd%60;
                    document.getElementById('timer').innerText = `${m}:${sec < 10 ? '0'+sec : sec}`;
                    if (tijd <= 0) {
                        clearInterval(timerInterval);
                        resolve();
                    }
                    tijd--;
                }, 1000);
            });
        }
        player.pause();
        document.getElementById('track-name').innerText = "Geen muziek";
        document.getElementById('current-mode').innerText = "VOLTOOID";
        spreekUit("Training voltooid! Goed gedaan.");
    }

    function spreekUit(t) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t);
        msg.lang = 'nl-NL';
        window.speechSynthesis.speak(msg);
    }

    // UITVOERING BIJ STARTEN PAGINA
    bouwLessenGrid(); 
    initDB();         
</script>
</body>
</html>
