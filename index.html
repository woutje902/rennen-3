<!DOCTYPE html>
<html>
<head>
  <style>
    body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto; }
    .player-container { background: linear-gradient(180deg, #282828 0%, #181818 100%); padding: 30px; border-radius: 20px; box-shadow: 0 12px 36px rgba(0,0,0,0.7); text-align: center; width: 480px; border: 1px solid #3e3e3e; margin: 20px; }
    h2 { margin: 0 0 5px 0; font-size: 24px; letter-spacing: 0.5px; }
    h3 { margin: 0 0 20px 0; font-size: 14px; color: #b3b3b3; font-weight: 400; }
    
    .upload-section { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; background: #000; padding: 15px; border-radius: 12px; border: 1px solid #282828; }
    .upload-box { flex: 1; text-align: center; }
    .upload-label { display: block; background: #3e3e3e; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: background 0.2s; border: 1px dashed #555; }
    .upload-label:hover { background: #4e4e4e; }
    .file-input { display: none; }
    .file-count { font-size: 11px; color: #888; margin-top: 5px; display: block; }

    .btn { background: #1db954; color: white; border: none; padding: 16px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(29, 185, 84, 0.4); width: 100%; box-sizing: border-box; }
    .btn:hover { background: #1ed760; transform: scale(1.02); box-shadow: 0 6px 20px rgba(29, 185, 84, 0.6); }
    .btn:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; transform: none; }
    
    .status-box { background: #000000; padding: 15px; border-radius: 10px; margin-top: 25px; border: 1px solid #282828; }
    .status-title { font-size: 14px; color: #b3b3b3; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    .track-name { margin-top: 8px; font-size: 18px; color: #1db954; font-weight: 600; min-height: 24px; }
    .shuffle-tag { display: inline-block; background: #2d2d2d; color: #1db954; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 12px; margin-top: 10px; border: 1px solid #1db954; }
    
    .visualizer-container { display: flex; justify-content: center; align-items: flex-end; height: 50px; margin-top: 20px; gap: 6px; }
    .wave-bar { width: 6px; height: 8px; background: linear-gradient(to top, #1db954, #1ed760); border-radius: 3px; display: none; }
    @keyframes bounce { 0%, 100% { height: 10px; } 50% { height: 50px; } }
  </style>
</head>
<body>

  <div class="player-container">
    <h2>Muziek Router Dashboard</h2>
    <h3>Bestanden blijven bewaard in je browser</h3>
    
    <div class="upload-section">
      <div class="upload-box">
        <label for="input-A" class="upload-label">📂 Kies Playlist A</label>
        <input type="file" id="input-A" class="file-input" accept="audio/*" multiple onchange="handleFileSelection('A')">
        <span id="count-A" class="file-count">Laden...</span>
      </div>
      <div class="upload-box">
        <label for="input-B" class="upload-label">📂 Kies Playlist B</label>
        <input type="file" id="input-B" class="file-input" accept="audio/*" multiple onchange="handleFileSelection('B')">
        <span id="count-B" class="file-count">Laden...</span>
      </div>
    </div>

    <button id="start-btn" class="btn" onclick="startPlayer()" disabled>Muziek laden...</button>
    
    <div class="visualizer-container" id="visualizer">
      <div class="wave-bar" style="animation: bounce 0.8s ease-in-out infinite alternate; animation-delay: 0.1s;"></div>
      <div class="wave-bar" style="animation: bounce 1.1s ease-in-out infinite alternate; animation-delay: 0.4s;"></div>
      <div class="wave-bar" style="animation: bounce 0.9s ease-in-out infinite alternate; animation-delay: 0.2s;"></div>
      <div class="wave-bar" style="animation: bounce 1.3s ease-in-out infinite alternate; animation-delay: 0.6s;"></div>
      <div class="wave-bar" style="animation: bounce 1.0s ease-in-out infinite alternate; animation-delay: 0.3s;"></div>
    </div>

    <div class="status-box">
      <div id="status" class="status-title">Systeem wordt opgestart</div>
      <div id="track" class="track-name">Moment geduld...</div>
      <div id="shuffle-indicator" class="shuffle-tag" style="display:none;">🔀 LOCALE OPSLAG & SHUFFLE ACTIEF</div>
    </div>
  </div>

  <script>
    var db;
    var rawFilesA = [];
    var rawFilesB = [];
    var shuffledPlaylist = [];
    var currentIndex = 0;
    var currentPlaylist = 'A';
    var activeAudio = new Audio();
    var isPlaying = false;

    // Start direct de database op zodra de pagina opent
    initDatabase();

    function initDatabase() {
      var request = indexedDB.open("MusicRouterDB", 1);
      
      request.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("playlistA")) db.createObjectStore("playlistA", { autoIncrement: true });
        if (!db.objectStoreNames.contains("playlistB")) db.createObjectStore("playlistB", { autoIncrement: true });
      };

      request.onsuccess = function(e) {
        db = e.target.result;
        // Haal direct de opgeslagen muziek van de vorige keer op
        loadSavedMusic('A');
        loadSavedMusic('B');
      };
    }

    function loadSavedMusic(type) {
      var transaction = db.transaction(["playlist" + type], "readonly");
      var store = transaction.objectStore("playlist" + type);
      var getAllRequest = store.getAll();

      getAllRequest.onsuccess = function() {
        if (type === 'A') rawFilesA = getAllRequest.result;
        if (type === 'B') rawFilesB = getAllRequest.result;
        
        document.getElementById('count-' + type).innerHTML = getAllRequest.result.length + " nummers bewaard";
        checkButtonStatus();
      };
    }

    function handleFileSelection(type) {
      var input = document.getElementById('input-' + type);
      var files = Array.from(input.files);
      if (files.length === 0) return;

      document.getElementById('count-' + type).innerHTML = "Bezig met opslaan...";

      // Wis oude data in de database voor deze playlist
      var transaction = db.transaction(["playlist" + type], "readwrite");
      var store = transaction.objectStore("playlist" + type);
      store.clear();

      var savedCount = 0;
      files.forEach(function(file) {
        var fileData = { name: file.name, data: file };
        var addRequest = store.add(fileData);
        
        addRequest.onsuccess = function() {
          savedCount++;
          if (savedCount === files.length) {
            // Herlaad de data vanuit de database voor stabiliteit
            loadSavedMusic(type);
          }
        };
      });
    }

    function checkButtonStatus() {
      var startBtn = document.getElementById('start-btn');
      if (rawFilesA.length > 0 && rawFilesB.length > 0) {
        startBtn.disabled = false;
        startBtn.innerHTML = "Start Muziek en Shuffle";
        document.getElementById('status').innerHTML = "Systeem staat stand-by";
        document.getElementById('track').innerHTML = "Klaar om te starten";
      } else {
        startBtn.disabled = true;
        startBtn.innerHTML = "Kies voor BEIDE lijsten muziek";
        document.getElementById('status').innerHTML = "Systeem incompleet";
        document.getElementById('track').innerHTML = "Voeg muziek toe aan A en B";
      }
    }

    function startPlayer() {
      if (isPlaying) return;
      isPlaying = true;
      
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('shuffle-indicator').style.display = 'inline-block';
      
      var bars = document.getElementsByClassName('wave-bar');
      for(var i=0; i<bars.length; i++) bars[i].style.display = 'block';

      shuffleAndLoadCurrentPlaylist();
      setInterval(switchPlaylist, 60000);
    }

    function shuffleAndLoadCurrentPlaylist() {
      var sourceList = (currentPlaylist === 'A') ? [...rawFilesA] : [...rawFilesB];

      if (sourceList.length === 0) {
        document.getElementById('track').innerHTML = "Geselecteerde lijst is leeg!";
        return;
      }

      for (var i = sourceList.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = sourceList[i];
        sourceList[i] = sourceList[j];
        sourceList[j] = temp;
      }

      shuffledPlaylist = sourceList;
      currentIndex = 0;
      
      playCurrentTrack();
    }

    function playCurrentTrack() {
      activeAudio.pause();
      
      if (currentIndex >= shuffledPlaylist.length) {
        shuffleAndLoadCurrentPlaylist();
        return;
      }

      var fileObject = shuffledPlaylist[currentIndex];
      // Haal het pure bestand (Blob) uit de database-structuur
      var fileURL = URL.createObjectURL(fileObject.data);
      
      document.getElementById('status').innerHTML = "Actieve Lijst: <b>Afspeellijst " + currentPlaylist + "</b>";
      document.getElementById('track').innerHTML = fileObject.name.replace(/\.[^/.]+$/, "");

      activeAudio.src = fileURL;
      activeAudio.play().catch(e => console.log("Afspeelfout: ", e));

      activeAudio.onended = function() {
        currentIndex++;
        playCurrentTrack();
      };
    }

    function switchPlaylist() {
      currentPlaylist = (currentPlaylist === 'A') ? 'B' : 'A';
      shuffleAndLoadCurrentPlaylist();
    }
  </script>
</body>
</html>
